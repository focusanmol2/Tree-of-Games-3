<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Tree of Games</title>

  <style>
    :root {
      --bg1: #041b11;
      --bg2: #072d1d;
      --accent: #39ff88;
      --accent-dark: #1ec96b;
      --card: rgba(16, 50, 30, 0.72);
      --text: #f0fff4;
      --muted: #bbf7d0;
      --border: rgba(57,255,136,0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, var(--bg1), var(--bg2));
      color: var(--text);
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    
      to {
        transform: translate(8%, 8%);
      }
    }

    .container {
      overflow: hidden;
      width: 100%;
      max-width: 1100px;
      padding: clamp(20px, 4vw, 45px);
      border-radius: 28px;
      background: rgba(5, 30, 18, 0.82);
      border: 2px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 35px rgba(57,255,136,0.18), 0 10px 40px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1.1;
      margin-bottom: 12px;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(57,255,136,0.35);
      word-wrap: break-word;
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      max-width: 650px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
    }

    .game-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 210px;
      padding: 24px 18px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(180deg, rgba(18,60,35,0.95), rgba(9,35,22,0.92));
      border: 2px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      will-change: transform;
    }

    

    .game-card:hover,
    .game-card:focus-visible {
      transform: translateY(-6px);
      border-color: rgba(57,255,136,0.95);
      box-shadow: 0 0 22px rgba(57,255,136,0.35), 0 8px 22px rgba(0,0,0,0.4);
    }

    

    .game-card:active {
      transform: scale(0.98);
    }

    

    .icon {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 14px;
    }

    .title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .desc {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      body {
        padding: 14px;
      }

      .container {
        border-radius: 22px;
        padding: 18px;
      }

      .games-grid {
        grid-template-columns: 1fr;
      }

      .game-card {
        min-height: 180px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  

  <main class="container">
    <header class="header">
      <h1>🌳 Tree of Games 🎮</h1>
      <p class="subtitle">
        Select a game to start playing.
      </p>
    </header>

    <section class="games-grid" id="gamesGrid"></section>

    <script>
      // Add your games here
      const games = [
        {
          title: "BOTTOM100",
          icon: "🏆",
          file: "game1/BOTTOM100.html"
        },
        {
          title: "CLASSIFIED",
          icon: "🕵️",
          file: "game2/CLASSIFIED.html"
        },
        {
          title: "SOMETHING SUS",
          icon: "ඞ",
          file: "game3/SOMETHING SUS.html"
        },
        {
          title: "EXPLORE",
          icon: "🧭",
          file: "game4/EXPLORE.html"
        },
        {
          title: "WTF WAS THAT SONG",
          icon: "🎧",
          file: "game5/WTF WAS THAT SONG.html"
        }
      ];

      const gamesGrid = document.getElementById("gamesGrid");

      games.forEach(game => {
        const card = document.createElement("a");
        card.href = game.file;
        card.className = "game-card";
        card.innerHTML = `
          <div class="icon">${game.icon}</div>
          <div class="title">${game.title}</div>
          <div class="desc">Play now</div>
        `;

        gamesGrid.appendChild(card);
      });
    </script>

    <footer>
      Creator: ANMOL
    </footer>
  </main>
</body>
</html>
