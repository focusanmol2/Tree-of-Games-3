<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOMETHING SUS</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #111622;
            --text: #f0f3f5;
            --red: #ff3838;
            --blue: #00d2d3;
            --gray: #2c3e50;
            --green: #10ac84;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 12px;
            overflow-x: hidden;
            position: relative;
        }

        html {
            height: -webkit-fill-available;
        }

        /* --- SPACE BACKGROUND ELEMENTS --- */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 250px 180px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 240px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 310px 120px, #fff, rgba(0,0,0,0));
            background-size: 350px 350px;
            opacity: 0.4;
        }

        .nebula {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 56, 56, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 20% 70%, rgba(0, 210, 211, 0.08) 0%, transparent 50%);
            filter: blur(40px);
        }

        .rocket {
            position: absolute;
            bottom: 15%;
            left: -100px;
            font-size: 2.5rem;
            opacity: 0.15;
            transform: rotate(45deg);
            animation: flyBy 25s linear infinite;
        }

        @keyframes flyBy {
            0% { left: -100px; bottom: 15%; transform: rotate(45deg); }
            50% { left: 110%; bottom: 85%; transform: rotate(45deg); }
            100% { left: 110%; bottom: 85%; transform: rotate(45deg); }
        }

        /* --- CONTAINERS & UI --- */
        .container {
            width: 100%;
            max-width: 540px;
            background: var(--card);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid #1e2736;
            text-align: center;
            display: none;
            z-index: 1;
            position: relative;
            backdrop-filter: blur(4px);
        }

        /* Target gameScreen to scale up dynamically to fit most of the viewport height */
        #gameScreen.container {
            max-width: 900px;
            width: 95vw;
            height: 90vh;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
        }

        .active {
            display: block;
        }
        
        /* Set active display rule explicitly for flex on gameScreen */
        #gameScreen.active {
            display: flex;
            animation: scaleUp 0.25s ease-out;
        }

        @keyframes scaleUp {
            from { transform: scale(0.96); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- HOME SCREEN SPECIFICS --- */
        #homeScreen h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--red);
            text-shadow: 0 0 15px rgba(255, 56, 56, 0.4);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .home-tagline {
            font-size: 1.1rem;
            color: #8a99ad;
            margin-bottom: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .space-ship-icon {
            font-size: 4.5rem;
            margin: 25px 0;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(0,212,211,0.2));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(-3deg); }
        }

        /* --- GAMEPLAY SCREEN --- */
        .round-num {
            font-size: 0.9rem;
            color: #8a99ad;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1.5px;
            flex-shrink: 0;
        }

        .scenario {
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 12px;
            min-height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* The container now grabs all available vertical space */
        .img-display {
            width: 100%;
            flex-grow: 1;
            height: 0; /* Allows flexbox to dynamically scale height instead of using a fixed px value */
            background: #090d14;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #1e2736;
            overflow: hidden;
        }

        .img-display img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .reason {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--red);
            margin-top: 8px;
            min-height: 24px;
            line-height: 1.4;
            flex-shrink: 0;
        }

        /* --- INTERACTIVE BUTTONS --- */
        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            flex-shrink: 0;
        }

        button {
            flex: 1;
            padding: 15px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            color: white;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-start { 
            background-color: var(--green); 
            width: 80%; 
            margin: 10px auto 0 auto;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(16, 172, 132, 0.3);
        }
        
        .btn-back { background-color: var(--gray); }
        .btn-eject { background-color: var(--red); box-shadow: 0 4px 12px rgba(255, 56, 56, 0.2); }
        .btn-next { background-color: var(--blue); }

        button:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

        /* --- MOBILE OPTIMIZATIONS --- */
        @media (max-width: 400px) {
            #homeScreen h1 { font-size: 2.3rem; }
            .container { padding: 16px; }
            #gameScreen.container { width: 98vw; height: 95vh; padding: 12px; }
            .scenario { font-size: 0.95rem; }
            button { font-size: 0.85rem; padding: 14px 8px; }
        }
    </style>
</head>
<body>

        let currentRound = 0;

        const scenarioTxt = document.getElementById("scenarioTxt");
        const gameImg = document.getElementById("gameImg");

        const btnBack = document.getElementById("btnBack");
        const btnEject = document.getElementById("btnEject");
        const btnNext = document.getElementById("btnNext");

        function loadRound(idx) {
            currentRound = idx;
            revealTxt.innerText = "";
            
            roundNum.innerText = `ROUND ${idx + 1} / 30`;
            scenarioTxt.innerText = rounds[idx].scenario;
            
            gameImg.style.display = "block";
            gameImg.src = rounds[idx].sceneImg;

            btnBack.disabled = idx === 0;
            btnEject.disabled = false;
            btnNext.innerText = idx === 29 ? "Finish" : "Next";
        }

        window.startGame = function() {
            hScreen.classList.remove("active");
            gScreen.classList.add("active");
            loadRound(0);
        };

        window.ejectPlayer = function() {
            gameImg.style.display = "block";
            gameImg.src = rounds[currentRound].ejectImg;
            revealTxt.innerText = rounds[currentRound].reason;
            btnEject.disabled = true;
        };

        window.goNext = function() {
            if (currentRound < 29) {
                loadRound(currentRound + 1);
            } else {
                gScreen.classList.remove("active");
                wScreen.classList.add("active");
            }
        };

        window.goBack = function() {
            if (currentRound > 0) {
                loadRound(currentRound - 1);
            }
        };

        window.restartGame = function() {
            wScreen.classList.remove("active");
            hScreen.classList.add("active");
        };
