<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASE FILES | UNKNOWN SUBJECT</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --folder: #c2b280; /* Manila Folder Color */
            --paper: #e8e4d9;
            --ink: #2c2c2c;
            --stamp: #8b0000; /* Dark Blood Red */
            --accent: #4a4a4a;
            --glow: 0 0 15px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }

body {
    background-color: var(--bg);
    background-image: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://www.transparenttextures.com/patterns/dark-leather.png');
    color: var(--paper);
    min-height: 100vh;
    display: flex;
    align-items: flex-start; /* Changed from 'center' so it scrolls from the top */
    justify-content: center;
    padding: 40px 10px;      /* Added extra top/bottom room for the "CLASSIFIED" tab */
    overflow-y: auto;        /* Changed from 'hidden' to allow scrolling */
}

.game-card {
    width: 100%;
    max-width: 550px;
    background: var(--folder);
    border-radius: 5px;
    padding: 2.5rem;
    text-align: center;
    box-shadow: 20px 20px 60px rgba(0,0,0,0.8);
    border: 1px solid #a3956a;
    /* max-height: 98vh; */ /* REMOVED/COMMENTED THIS OUT to allow the card to grow */
    display: flex;
    flex-direction: column;
    position: relative;
    color: var(--ink);
    margin-top: 30px;        /* Added space so your top folder tab isn't cut off */
}

        /* The Manila Folder Tab */
        .game-card::before {
            content: "CLASSIFIED";
            position: absolute;
            top: -30px;
            left: 20px;
            background: var(--folder);
            padding: 5px 20px;
            font-weight: bold;
            border-radius: 10px 10px 0 0;
            border: 1px solid #a3956a;
            border-bottom: none;
            font-size: 0.8rem;
        }

        .hidden { display: none !important; }

        .title { 
            font-size: 2.2rem; 
            font-weight: 900; 
            color: var(--ink); 
            text-transform: uppercase;
            letter-spacing: -1px;
            border-bottom: 3px double var(--ink);
            margin-bottom: 1.5rem;
        }
        
        .person-image-container {
            width: 260px;
            height: 260px;
            margin: 0 auto 1.5rem;
            background: #fff;
            padding: 10px 10px 40px 10px; /* Polaroid look */
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            transform: rotate(-2deg);
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .person-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) sepia(20%) contrast(120%);
        }

        .placeholder-text {
            font-size: 80px;
            font-weight: 900;
            color: #ccc;
            transform: rotate(2deg);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .box {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .box:hover { background: var(--paper); transform: scale(1.05); }
        .box.used { 
            background: var(--stamp); 
            color: white; 
            text-decoration: line-through;
            border-color: var(--stamp);
        }

        .timer-badge {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 1rem;
            display: inline-block;
            border: 2px solid var(--stamp);
            color: var(--stamp);
            padding: 2px 10px;
            text-transform: uppercase;
        }

        .hint-stack { text-align: left; flex-grow: 1; margin-bottom: 1rem; overflow-y: auto; padding-right: 10px; }
        .hint-item {
            background: url('https://www.transparenttextures.com/patterns/lined-paper.png');
            background-color: var(--paper);
            padding: 1rem;
            margin-bottom: 0.8rem;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            font-size: 0.95rem;
            line-height: 1.3;
            border: 1px solid #d1cdbf;
            position: relative;
        }

        /* Typewriter Animation */
        .hint-item::before {
            content: "INTEL:";
            font-weight: bold;
            display: block;
            font-size: 0.7rem;
            color: var(--stamp);
            margin-bottom: 3px;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--ink);
            background: transparent;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--ink);
        }

        .btn:hover { background: var(--ink); color: var(--paper); }
        
        .btn-random { 
            border: 2px dashed var(--stamp); 
            color: var(--stamp); 
            margin-bottom: 1.5rem;
        }
        .btn-random:hover { background: var(--stamp); color: white; }

        .progress-bar { width: 100%; height: 5px; background: rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .progress-fill { height: 100%; background: var(--ink); width: 0%; transition: width 0.4s ease; }

        /* Stamp Effect for Final */
        .stamp-reveal {
            border: 4px solid var(--stamp);
            color: var(--stamp);
            padding: 10px;
            display: inline-block;
            transform: rotate(-15deg);
            font-size: 2rem;
            font-weight: 900;
            margin: 1rem 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <div id="scr-start">
            <h1 class="title">BUREAU OF INVESTIGATION</h1>
            <p style="margin-bottom: 2rem; font-size: 0.8rem; font-weight: bold;">SUBJECT IDENTIFICATION DRILL</p>
            <div class="person-image-container">
                <span class="placeholder-text">?</span>
            </div>
            <button class="btn" onclick="showView('scr-grid')">OPEN CASE FILES</button>
        </div>

        <div id="scr-grid" class="hidden">
            <h2 style="margin-bottom: 1rem; font-size: 1rem;">SELECT DOSSIER</h2>
            <button class="btn btn-random" onclick="pickRandom()">EXPLICIT SEARCH WARRANT</button>
            <div id="level-grid" class="grid"></div>
        </div>

        <div id="scr-intro" class="hidden">
            <div id="intro-img-container" class="person-image-container"></div>
            <h2 id="intro-name" style="font-size: 1.8rem; margin-bottom: 0.5rem;"></h2>
            <p style="font-size: 0.8rem; margin-bottom: 2rem;">REDACTING VISUAL EVIDENCE IN 3... 2... 1...</p>
            <button class="btn" onclick="beginGuessing()">INTERROGATE BALE</button>
        </div>

        <div id="scr-play" class="hidden">
            <div id="game-timer" class="timer-badge">ELAPSED: 00:00</div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <div id="hint-list" class="hint-stack"></div>
            <button id="action-btn" class="btn" onclick="handleAction()">REQUEST FURTHER INTEL</button>
        </div>

        <div id="scr-final" class="hidden">
            <div class="stamp-reveal">IDENTIFIED</div>
            <div id="final-img-container" class="person-image-container" style="transform: rotate(2deg);"></div>
            <h2 id="final-name" style="font-size: 2rem; text-decoration: underline;"></h2>
            <div style="margin: 1rem 0; font-size: 0.9rem; font-weight: bold;">
                CASE CLOSED IN <span id="final-time"></span>
            </div>
            <button class="btn" onclick="showView('scr-grid')">NEXT CASE</button>
        </div>
    </div>

        let state = { activeIdx: 0, hintStep: 0, seconds: 0, timer: null, solved: new Set() };

        function initGrid() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            DATA.forEach((_, i) => {
                const b = document.createElement('div');
                b.className = `box ${state.solved.has(i) ? 'used' : ''}`;
                b.innerText = i + 1;
                b.onclick = () => openLevel(i);
                grid.appendChild(b);
            });
        }

        function setPersonImage(containerId, personName) {
            const container = document.getElementById(containerId);
            const dataUri = IMAGES[personName];
            if (dataUri && dataUri.trim() !== "") {
                container.innerHTML = `<img class="person-image" src="${dataUri}" alt="${personName}">`;
            } else {
                container.innerHTML = `<span class="placeholder-text">${personName[0]}</span>`;
            }
        }

        function openLevel(idx) {
            state.activeIdx = idx;
            const personName = DATA[idx].name;
            document.getElementById('intro-name').innerText = personName;
            setPersonImage('intro-img-container', personName);
            showView('scr-intro');
        }

        function pickRandom() {
            let available = DATA.map((_, i) => i).filter(i => !state.solved.has(i));
            if (available.length === 0) available = DATA.map((_, i) => i);
            openLevel(available[Math.floor(Math.random() * available.length)]);
        }

        function beginGuessing() {
            state.hintStep = 0; state.seconds = 0;
            document.getElementById('hint-list').innerHTML = '';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('action-btn').innerText = "REQUEST FURTHER INTEL";
            showView('scr-play'); 
            startClock(); 
            revealHint();
        }

        function handleAction() {
            if (state.hintStep < DATA[state.activeIdx].hints.length) {
                revealHint();
            } else {
                showFinal();
            }
        }

        function revealHint() {
            const hints = DATA[state.activeIdx].hints;
            const item = document.createElement('div');
            item.className = 'hint-item';
            item.innerText = hints[state.hintStep];
            document.getElementById('hint-list').appendChild(item);
            state.hintStep++;
            document.getElementById('progress-fill').style.width = (state.hintStep / hints.length) * 100 + '%';
            if (state.hintStep === hints.length) {
                document.getElementById('action-btn').innerText = "FINALIZE IDENTIFICATION";
                document.getElementById('action-btn').style.borderColor = 'var(--stamp)';
                document.getElementById('action-btn').style.color = 'var(--stamp)';
            }
        }

        function showFinal() {
            clearInterval(state.timer); 
            state.solved.add(state.activeIdx);
            const personName = DATA[state.activeIdx].name;
            document.getElementById('final-name').innerText = personName;
            document.getElementById('final-time').innerText = document.getElementById('game-timer').innerText.replace('ELAPSED: ', '');
            setPersonImage('final-img-container', personName);
            showView('scr-final'); 
            initGrid();
        }

        function startClock() {
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                state.seconds++;
                const m = Math.floor(state.seconds / 60).toString().padStart(2, '0');
                const s = (state.seconds % 60).toString().padStart(2, '0');
                document.getElementById('game-timer').innerText = `ELAPSED: ${m}:${s}`;
            }, 1000);
        }

        function showView(id) {
            const screens = ['scr-start', 'scr-grid', 'scr-intro', 'scr-play', 'scr-final'];
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'scr-play') {
                document.getElementById('action-btn').style.borderColor = 'var(--ink)';
                document.getElementById('action-btn').style.color = 'var(--ink)';
            }
        }

        initGrid();
    </script>
