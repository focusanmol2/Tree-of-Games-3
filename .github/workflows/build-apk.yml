name: Make My APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Files
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Compile Website to APK
      uses: darkshredder/website-to-apk-action@v1.1.1
      with:
        app-name: "TreeOfGames"
        build-folder-path: "./"
        output-folder-path: "output/"

    - name: Upload Final App
      uses: actions/upload-artifact@v4
      with:
        name: My-Phone-App
        path: output/**/*.apk
