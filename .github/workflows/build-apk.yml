name: Generate Game APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Web Code
      uses: actions/checkout@v4

    - name: Initialize Android System Studio Template
      run: |
        git clone https://github.com/shiahonb777/web-to-app.git android-project
        mkdir -p android-project/app/src/main/assets/www
        cp -r ./game1 ./game2 ./game3 ./game4 ./game5 ./index.html android-project/app/src/main/assets/www/ || true
        cp -r ./* android-project/app/src/main/assets/www/ || true

    - name: Setup Java Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Build Permissions
      run: chmod +x android-project/gradlew

    - name: Compile Native Mobile APK
      run: |
        cd android-project
        ./gradlew assembleDebug

    - name: Deliver Finished APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TreeOfGames-App
        path: android-project/app/build/outputs/apk/debug/*.apk
